<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../index.css">
  <link rel="stylesheet" href="login.css">
  <title>Authentication - Rate the 90</title>
</head>
<body>
  <main>
    <nav>
      <a href="index.html" class="navp">RateThe90</a>
      <div>
          <button class="navdm">DarkMode</button>
      </div>
    </nav>

    <div class="container auth-container">
      
      <div id="login-box">
        <h1>Login to Rate the 90</h1>
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" required placeholder="Enter your email">
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" required placeholder="Enter your password">
          </div>
          <button type="submit" class="btn-submit">Sign In</button>
        </form>
        <p class="auth-redirect">Don't have an account? <a href="#" id="to-signup">Sign up here</a></p>
      </div>

      <div id="signup-box" class="hidden">
        <h1>Create an Account</h1>
        <form id="signup-form">
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" required placeholder="Enter your email">
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" required placeholder="Min. 6 characters">
          </div>
          <button type="submit" class="btn-submit">Sign Up</button>
        </form>
        <p class="auth-redirect">Already have an account? <a href="#" id="to-login">Login here</a></p>
      </div>
      
      <p id="auth-message" class="message"></p>
    </div>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
