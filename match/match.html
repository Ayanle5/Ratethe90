<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Dashboard</title>
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <h1>Dashboard</h1>
      <nav>
        <a href="#overview">Overview</a>
        <a href="#ratings">Ratings</a>
        <a href="#activity">Activity</a>
        <a href="#settings">Settings</a>
      </nav>
    </aside>
    <main class="content">
      <div class="header">
        <div>
          <h2>Welcome back</h2>
          <p>Quick summary of recent activity</p>
        </div>
      </div>
      <section class="cards">
        <div class="card">
          <h3>Total Reviews</h3>
          <p>1,254</p>
        </div>
        <div class="card">
          <h3>Average Score</h3>
          <p>8.7</p>
        </div>
        <div class="card">
          <h3>New Ratings</h3>
          <p>42</p>
        </div>
        <div class="card">
          <h3>Response Rate</h3>
          <p>92%</p>
        </div>
      </section>
      <section class="table">
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Status</th>
              <th>Score</th>
              <th>Last Updated</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Match 1</td>
              <td>Active</td>
              <td>9.0</td>
              <td>Today</td>
            </tr>
            <tr>
              <td>Match 2</td>
              <td>Pending</td>
              <td>8.3</td>
              <td>Yesterday</td>
            </tr>
            <tr>
              <td>Match 3</td>
              <td>Closed</td>
              <td>7.8</td>
              <td>2 days ago</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
</body>
</html>
